name: Test App Artifacts

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build debug-signed Android dev release APK
        required: true
        type: boolean
        default: true
      build_macos:
        description: Build unsigned macOS DMG/ZIP artifacts
        required: true
        type: boolean
        default: true
      publish_release:
        description: Publish built artifacts as a GitHub prerelease
        required: true
        type: boolean
        default: true
      source_run_id:
        description: Existing workflow run ID to publish artifacts from; leave empty to publish this run
        required: false
        type: string
        default: ''

permissions:
  actions: read
  contents: write

concurrency:
  group: test-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-test-apk:
    name: Android Test APK
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared web bundle
        run: yarn build:web

      - name: Prepare mobile web assets
        run: yarn workspace @standardnotes/mobile bundle:web

      - name: Bundle Android JavaScript
        run: yarn workspace @standardnotes/mobile android:bundle

      - name: Set app version
        run: echo "APP_VERSION=$(node -p 'require("./packages/web/package.json").version.split("-")[0]')" >> "$GITHUB_ENV"

      - name: Assemble debug-signed dev release APK
        working-directory: packages/mobile/android
        env:
          DETOX_CI: '1'
        run: |
          ./gradlew assembleDevRelease \
            -PversionName="${APP_VERSION}" \
            -PversionCode="${{ github.run_number }}" \
            --stacktrace

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: standard-notes-android-test-apk
          retention-days: 14
          if-no-files-found: error
          path: packages/mobile/android/app/build/outputs/apk/dev/release/app-dev-release.apk

  macos-test-binaries:
    name: macOS Test Binaries
    if: ${{ inputs.build_macos }}
    uses: ./.github/workflows/desktop.build.reuse.yml
    with:
      platform: mac

  publish-test-release:
    name: Publish Test Release
    if: ${{ always() && inputs.publish_release && (needs.android-test-apk.result == 'success' || !inputs.build_android) && (needs.macos-test-binaries.result == 'success' || !inputs.build_macos) }}
    needs:
      - android-test-apk
      - macos-test-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          run-id: ${{ inputs.source_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Set release metadata
        id: release
        run: |
          short_sha="${GITHUB_SHA::9}"
          tag="test-artifacts-${GITHUB_RUN_NUMBER}-${short_sha}"
          {
            echo "tag=${tag}"
            echo "title=Test artifacts ${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize release assets
        run: find release-assets -maxdepth 4 -type f -print | sort

      - name: Publish prerelease
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.title }}
          body: |
            Test build from `${{ github.sha }}`.

            Includes debug-signed Android dev APK and unsigned macOS artifacts produced by this workflow run.

            Publish workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Artifact source run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.source_run_id || github.run_id }}
          prerelease: true
          draft: false
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.apk
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.blockmap
            release-assets/**/*.yml
            release-assets/**/*.yaml
